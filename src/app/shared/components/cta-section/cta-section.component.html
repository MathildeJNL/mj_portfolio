<section class="py-16 px-4 md:px-8">
    <div class="max-w-[800px] mx-auto text-center">
        <div class="p-8 rounded-2xl bg-gradient-to-r from-brand-blue/10 to-brand-teal/10 border border-brand-blue/20">
            <h2 class="text-2xl font-bold text-slate-900 dark:text-brand-text mb-4">{{ title }}</h2>
            <p class="text-slate-500 dark:text-brand-muted mb-6">{{ description }}</p>
            <div class="flex flex-wrap justify-center gap-4">
                @if (primaryButton) {
                <app-button [title]="primaryButton.label" [name]="primaryButton.label" [svgName]="primaryButton.icon"
                    [svgSize]="20" color="primary" [label]="primaryButton.label" (action)="navigate(primaryButton)">
                </app-button>
                }
                @if (secondaryButton) {
                <app-button [title]="secondaryButton.label" [name]="secondaryButton.label"
                    [svgName]="secondaryButton.icon" [svgSize]="20" color="secondary" [label]="secondaryButton.label"
                    (action)="navigate(secondaryButton)">
                </app-button>
                }
            </div>
        </div>
    </div>
</section>
