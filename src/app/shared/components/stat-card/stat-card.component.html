<div
    class="h-full p-6 rounded-xl bg-white dark:bg-brand-surface border border-slate-200 dark:border-brand-border text-center flex flex-col items-center justify-center gap-1">
    <i class="material-symbols-outlined text-3xl mb-2" [ngClass]="colorClass" aria-hidden="true">{{ icon }}</i>
    <p class="text-3xl font-black text-slate-900 dark:text-brand-text">{{ value }}</p>
    <p class="text-sm text-slate-500 dark:text-brand-muted">{{ label }}</p>
</div>
